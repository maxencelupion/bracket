services:
  db:
    image: postgres:16
    container_name: tournament_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tournament}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tournament}
      POSTGRES_DB: ${POSTGRES_DB:-tournament}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
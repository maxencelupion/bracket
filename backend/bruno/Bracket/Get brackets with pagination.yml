info:
  name: Get brackets with pagination
  type: http
  seq: 3

http:
  method: GET
  url: http://{{baseUrl}}:{{appPort}}/brackets?page=2&limit=3
  params:
    - name: page
      value: "2"
      type: query
    - name: limit
      value: "3"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

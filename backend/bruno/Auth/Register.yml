  url: http://{{baseUrl}}:{{appPort}}/auth/register
  body:
    type: json
    data: |-
      {
        "pseudo": "pseudo",
        "email": "email@gmail.com",
        "password": "Password1!",
        "confirmPassword": "Password1!"
      }
